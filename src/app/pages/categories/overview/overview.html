<main class="w-full px-4 md:px-7 xl:px-10 flex flex-col gap-y-10 lg:gap-7">

    <div class="flex items-center gap-x-2">
        <div>
            <h1 class="text-lg font-medium">Categorías (0)</h1>
            <p class="text-sm text-gray-700">Panel de control de categorías</p>
        </div>

        <button class="ml-auto text-sm btn-primary border-none!" aria-haspopup="dialog" aria-expanded="false"
            aria-controls="hs-add-category-modal" data-hs-overlay="#hs-add-category-modal">
            Agregar
            <span class="max-sm:hidden"> categoría</span>
        </button>
    </div>


    <!-- <component-categories-kpis /> -->
    <component-categories-list (editClick)="onEditCategory($event)" />

</main>

<!-- Modal de agregar categoría -->
<div id="hs-add-category-modal"
    class="hs-overlay hidden size-full fixed top-0 inset-s-0 z-80 overflow-x-hidden overflow-y-auto pointer-events-none"
    role="dialog" tabindex="-1" aria-labelledby="hs-add-category-modal-label">
    <component-categories-add />
</div>

<!-- Modal de editar categoría -->
<div id="hs-edit-category-modal"
    class="hs-overlay hidden size-full fixed top-0 inset-s-0 z-80 overflow-x-hidden overflow-y-auto pointer-events-none"
    role="dialog" tabindex="-1" aria-labelledby="hs-edit-category-modal-label">
    @if (selectedCategory) {
        <component-categories-edit [category]="selectedCategory" (editSuccess)="selectedCategory = null" />
    }
</div>
