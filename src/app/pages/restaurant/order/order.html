<main class="w-full px-4 md:px-7 xl:px-10 flex flex-col gap-7">

    <div class="flex items-center gap-x-2">
        <div>
            <a routerLink=".." class="text-sm text-primary font-medium hover:underline">Regresar</a>
            <h1 class="text-lg font-medium">Tomar Pedido</h1>
        </div>

    </div>

    <!-- Contenido -->
    <div class="grid xl:grid-cols-[1fr_auto] gap-5 h-full">

        <!-- Lista de Productos -->
        <div class="overflow-y-auto gap-5 grid grid-rows-[1fr_auto]">
            <component-restaurant-order-select-products />
        </div>

        <!-- Información del Pedido -->
        <div class="relative">
            <div class="sticky top-0">
                <component-restaurant-order-summary />
            </div>
        </div>
    </div>

    <div class="sticky bottom-0 z-50">
        <div class="w-fit mx-auto">
            <component-shared-toast [btnCancel]="true" [btnSave]="true" (saveClick)="onConfirmOrder()" />
        </div>
    </div>

</main>
