<main class="w-full px-4 md:px-7 lg:px-10 flex flex-col gap-y-7 h-full relative">

    <div>
        <a routerLink=".."
            class="text-sm text-primary font-medium hover:underline hover:text-primary-hover">Regresar</a>
        <h1 class="text-lg font-medium">Detalles del Descuento: {{ discount?.code || 'Cargando...' }}</h1>
    </div>

    <div class="h-full">
        <component-discounts-details-info [discount]="discount" />
    </div>

    <div class="sticky bottom-0">
        <div class="w-fit mx-auto">
            <component-shared-toast [btnDelete]="true" [btnEdit]="true" [btnDisable]="discount?.enabled === true"
                [btnEnable]="discount?.enabled === false" (deleteClick)="onDeleteClick()" (editClick)="onEditClick()"
                (disableClick)="onStatusClick()" (enableClick)="onStatusClick()" />
        </div>
    </div>
</main>

<!-- Modal de editar descuento -->
<div id="hs-edit-discount-modal"
    class="hs-overlay hidden size-full fixed top-0 inset-s-0 z-80 overflow-x-hidden overflow-y-auto pointer-events-none"
    role="dialog" tabindex="-1" aria-labelledby="hs-edit-discount-modal-label">
    <component-discounts-edit [discount]="discount" (editSuccess)="loadDiscount()" />
</div>
