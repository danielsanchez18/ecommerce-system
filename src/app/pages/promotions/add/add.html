<main class="w-full px-4 md:px-7 xl:px-10 flex flex-col gap-7">

    <div>
        <a routerLink=".." class="text-sm text-primary font-medium hover:underline">Regresar</a>
        <h1 class="text-lg font-medium">Crear Promoción</h1>
    </div>

    <div class="flex items-center gap-x-5 overflow-x-auto scrollbar-hide border-b border-gray-300">

        <button (click)="activeTab = 'info'" [ngClass]="{
        'border-b-primary font-medium text-primary': activeTab === 'info',
      }" class="text-sm border-b-2 border-transparent text-nowrap hover:border-primary pb-2">
            Información Básica
        </button>

        <button (click)="activeTab = 'products'" [ngClass]="{
          'border-b-primary font-medium text-primary': activeTab === 'products',
        }" class="text-sm border-b-2 border-transparent text-nowrap hover:border-primary pb-2">
            Productos
        </button>

        <button (click)="activeTab = 'prices'" [ngClass]="{
          'border-b-primary font-medium text-primary': activeTab === 'prices',
        }" class="text-sm border-b-2 border-transparent text-nowrap hover:border-primary pb-2">
            Precios y Fechas
        </button>

        <button (click)="activeTab = 'terms'" [ngClass]="{
          'border-b-primary font-medium text-primary': activeTab === 'terms',
        }" class="text-sm border-b-2 border-transparent text-nowrap hover:border-primary pb-2">
            Términos y Condiciones
        </button>

    </div>


    <!-- Contenido -->
    <div class="min-h-full">
        <component-promotions-add-info [promotion]="promotion"
            [ngClass]="{ 'block': activeTab === 'info', 'hidden': activeTab !== 'info' }" />

        <component-promotions-add-products [selectedProducts]="selectedProducts"
            [ngClass]="{ 'block': activeTab === 'products', 'hidden': activeTab !== 'products' }" />

        <component-promotions-add-prices [promotion]="promotion" [originalPrice]="originalPrice"
            [ngClass]="{ 'block': activeTab === 'prices', 'hidden': activeTab !== 'prices' }" />

        <component-promotions-add-terms [promotion]="promotion"
            [ngClass]="{ 'block': activeTab === 'terms', 'hidden': activeTab !== 'terms' }" />
    </div>

    <div class="sticky bottom-0 z-50">
        <div class="w-fit mx-auto">
            <component-shared-toast [btnCancel]="true" [btnSave]="true" (saveClick)="onSave()" />
        </div>
    </div>

</main>
