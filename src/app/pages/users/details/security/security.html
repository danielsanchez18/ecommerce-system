<article class="rounded-2xl border border-gray-300 bg-white overflow-hidden">
    <div class="px-5 py-3 border-b border-gray-300">
        <h2 class="text-sm font-medium">Seguridad</h2>
    </div>

    <div class="p-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">

        <button type="button" data-hs-overlay="#hs-change-role-modal"
            class="flex flex-col items-center justify-center p-4 rounded-xl border border-gray-200 hover:border-primary hover:bg-primary/5 transition-all gap-2 group">
            <div class="p-3 rounded-full bg-blue-100 text-blue-600 group-hover:bg-primary group-hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-6"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <span class="font-medium text-gray-800 text-sm group-hover:text-primary">Cambiar rol</span>
        </button>

        <button type="button" (click)="onSuspendAccount()"
            class="flex flex-col items-center justify-center p-4 rounded-xl border border-gray-200 hover:border-amber-500 hover:bg-amber-50 transition-all gap-2 group">
            <div class="p-3 rounded-full bg-amber-100 text-amber-600 group-hover:bg-amber-500 group-hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-6"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
            </div>
            <span class="font-medium text-gray-800 text-sm group-hover:text-amber-600">Suspender cuenta</span>
        </button>

        <button type="button" (click)="onDeleteUser()"
            class="flex flex-col items-center justify-center p-4 rounded-xl border border-gray-200 hover:border-red-500 hover:bg-red-50 transition-all gap-2 group">
            <div class="p-3 rounded-full bg-red-100 text-red-600 group-hover:bg-red-500 group-hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-6"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </div>
            <span class="font-medium text-gray-800 text-sm group-hover:text-red-600">Eliminar usuario</span>
        </button>

    </div>
</article>

<!-- Modal para seleccionar rol -->
<div id="hs-change-role-modal" class="hs-overlay hidden size-full fixed top-0 start-0 z-[80] overflow-x-hidden overflow-y-auto pointer-events-none" role="dialog" tabindex="-1" aria-labelledby="hs-change-role-modal-label">
  <div class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-lg sm:w-full m-3 sm:mx-auto min-h-[calc(100%-3.5rem)] flex items-center">
    <div class="w-full flex flex-col bg-white border border-gray-200 shadow-sm rounded-xl pointer-events-auto">
      <div class="flex justify-between items-center py-3 px-4 border-b border-gray-200">
        <h3 id="hs-change-role-modal-label" class="font-medium text-gray-800">
          Cambiar Rol de Usuario
        </h3>
        <button type="button" class="size-8 inline-flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-100 text-gray-800 hover:bg-gray-200 focus:outline-none focus:bg-gray-200 disabled:opacity-50 disabled:pointer-events-none" aria-label="Close" data-hs-overlay="#hs-change-role-modal">
          <span class="sr-only">Close</span>
          <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </div>
      <div class="p-4 overflow-y-auto">
        @if (loading) {
            <p class="text-sm text-gray-500 text-center py-4">Cargando...</p>
        } @else {
            <label for="role-select" class="block text-sm font-medium mb-2 text-gray-700">Selecciona el nuevo rol:</label>
            <select id="role-select" [(ngModel)]="selectedRoleId" class="py-3 px-4 pe-9 block w-full border-gray-200 rounded-lg text-sm focus:border-primary focus:ring-primary disabled:opacity-50 disabled:pointer-events-none">
                <option value="" disabled>Selecciona un rol...</option>
                @for (role of roles; track role.id) {
                    <option [value]="role.id">{{ role.name }}</option>
                }
            </select>
        }
      </div>
      <div class="flex justify-end items-center gap-x-2 py-3 px-4 border-t border-gray-200">
        <button type="button" class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 focus:outline-none focus:bg-gray-50" data-hs-overlay="#hs-change-role-modal">
          Cancelar
        </button>
        <button type="button" (click)="onChangeRole()" data-hs-overlay="#hs-change-role-modal" [disabled]="!selectedRoleId" class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-primary text-white hover:bg-primary/90 focus:outline-none disabled:opacity-50">
          Guardar cambios
        </button>
      </div>
    </div>
  </div>
</div>
