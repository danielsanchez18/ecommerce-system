<div class="px-4 py-6 md:px-7 lg:px-10 max-w-3xl mx-auto">
  <div class="mb-6">
    <a routerLink="/delivery" class="inline-flex items-center gap-x-2 text-sm text-gray-600 hover:text-primary transition-colors">
      <svg lucideArrowLeft class="size-4" />
      Volver a la lista
    </a>
  </div>

  <div *ngIf="loading" class="flex justify-center items-center py-20">
    <div class="animate-spin inline-block w-8 h-8 border-4 border-current border-t-transparent text-primary rounded-full" role="status" aria-label="loading">
      <span class="sr-only">Cargando...</span>
    </div>
  </div>

  <div *ngIf="order && !loading" class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
    <div class="p-4 sm:p-6 border-b border-gray-200 bg-gray-50/50">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-xl font-bold text-gray-800">Pedido {{ order.orderCode }}</h1>
          <p class="text-sm text-gray-500 mt-1">{{ order.createdAt | date:'medium' }}</p>
        </div>
        <div class="text-right">
          <p class="text-lg font-bold text-gray-800">S/ {{ order.totalAmount }}</p>
          <span class="inline-flex items-center gap-1.5 py-1 px-2 rounded-md text-xs font-medium bg-blue-100 text-blue-800">
            {{ order.paymentMethod || 'Efectivo' }}
          </span>
        </div>
      </div>
    </div>

    <div class="p-4 sm:p-6 space-y-6">
      <!-- Address -->
      <div>
        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Dirección de Entrega</h3>
        <div class="flex items-start gap-x-3 bg-gray-50 p-3 rounded-lg border border-gray-100">
          <svg lucideMapPin class="shrink-0 size-5 text-gray-500 mt-0.5" />
          <p class="text-sm text-gray-800 font-medium leading-relaxed">{{ order.deliveryAddress || 'Sin dirección registrada' }}</p>
        </div>
      </div>

      <!-- Items -->
      <component-orders-details-products [order]="order" />
      
      <!-- Error messages -->
      <div *ngIf="locationError" class="bg-yellow-50 border border-yellow-200 text-yellow-800 text-sm p-4 rounded-lg flex gap-x-2">
        <svg lucideXCircle class="shrink-0 size-5 mt-0.5 text-yellow-500" />
        <p>{{ locationError }}</p>
      </div>

      <!-- Actions -->
      <div class="pt-4 flex flex-col sm:flex-row gap-3">
        <button (click)="cancelOrder()" [disabled]="processing" class="w-full sm:w-auto inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none px-6 py-3.5">
          <svg lucideXCircle class="size-5" />
          Cancelar
        </button>
        <button (click)="deliverOrder()" [disabled]="processing" class="w-full flex-1 inline-flex justify-center items-center gap-x-2 text-sm font-bold rounded-lg border border-transparent bg-green-600 text-white shadow-sm hover:bg-green-700 disabled:opacity-50 disabled:pointer-events-none px-6 py-3.5">
          <svg *ngIf="!processing" lucideCheckCircle class="size-5" />
          <span *ngIf="processing" class="animate-spin inline-block size-5 border-[3px] border-current border-t-transparent text-white rounded-full" role="status" aria-label="loading"></span>
          {{ processing ? 'Procesando entrega...' : 'Entregar Pedido' }}
        </button>
      </div>
    </div>
  </div>
</div>
