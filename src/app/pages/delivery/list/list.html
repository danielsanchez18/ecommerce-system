<div class="px-4 py-6 md:px-7 lg:px-10 max-w-4xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-semibold text-gray-800">Pedidos por Entregar</h1>
    <span class="text-sm font-medium text-gray-500 bg-gray-100 px-3 py-1 rounded-full">
      {{ orders.length }} pendientes
    </span>
  </div>

  <div *ngIf="loading" class="flex justify-center items-center py-20">
    <div class="animate-spin inline-block w-8 h-8 border-4 border-current border-t-transparent text-primary rounded-full" role="status" aria-label="loading">
      <span class="sr-only">Cargando...</span>
    </div>
  </div>

  <div *ngIf="!loading && orders.length === 0">
    <component-shared-empty 
      title="¡Todo al día!" 
      description="No tienes pedidos listos para entrega en este momento.">
    </component-shared-empty>
  </div>

  <div *ngIf="!loading && orders.length > 0" class="grid gap-4 sm:grid-cols-2">
    <div *ngFor="let order of orders" class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden hover:shadow-md transition-shadow">
      <div class="p-4 sm:p-5">
        <div class="flex justify-between items-start mb-3">
          <div>
            <span class="text-xs font-semibold tracking-wide uppercase text-primary bg-primary/10 px-2 py-1 rounded-md">
              {{ order.orderCode }}
            </span>
            <p class="text-sm text-gray-500 mt-1">{{ order.createdAt | date:'shortTime' }}</p>
          </div>
          <p class="font-bold text-gray-800">S/ {{ order.totalAmount }}</p>
        </div>

        <div class="space-y-3 mt-4">
          <div class="flex items-start gap-x-3 text-sm text-gray-600">
            <svg lucideMapPin class="shrink-0 size-4 mt-0.5 text-gray-400" />
            <p class="line-clamp-2">{{ order.deliveryAddress || 'Sin dirección registrada' }}</p>
          </div>
          <div class="flex items-center gap-x-3 text-sm text-gray-600">
            <svg lucidePackage class="shrink-0 size-4 text-gray-400" />
            <p>{{ order.items?.length || 0 }} productos</p>
          </div>
        </div>

        <div class="mt-5">
          <a [routerLink]="['/delivery/pedidos', order.id]" class="w-full inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent bg-primary text-white hover:bg-primary-hover disabled:opacity-50 disabled:pointer-events-none py-3 px-4">
            Ver Detalles y Entregar
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
