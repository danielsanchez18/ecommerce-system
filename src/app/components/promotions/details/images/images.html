<section class="h-full">
    <div class="grid gap-2">

        <!-- Imagen Principal -->
        <div class="w-full h-84 rounded-lg relative group contain-content bg-gray-200">
            @if (imagenPrincipal) {
            <img [src]="imagenPrincipal"
                class="w-full h-full rounded-lg object-cover justify-self-center group-hover:scale-105 transition-all duration-300">

            <div
                class="w-full h-full bg-black/20 z-50 absolute group-hover:flex items-center justify-center hidden top-0 p-2">
                <a [href]="imagenPrincipal" target="_blank"
                    class="text-xs font-medium bg-gray-950 hover:shadow-md h-fit text-white rounded-lg px-4 p-2">
                    Ver imagen completa
                </a>
            </div>
            } @else {
            <div class="w-full h-full flex flex-col gap-2 items-center justify-center bg-gray-100 text-gray-400">
                <svg class="size-12 stroke-[1.2]" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21 15 16 10 5 21" />
                </svg>
                <span class="text-xs">Sin imágenes de producto</span>
            </div>
            }
        </div>

        <!-- Imagenes Adicionales -->
        <div class="flex gap-x-2 overflow-x-auto w-full">
            @for (imagen of imagenesAdicionales; track $index) {
            <button (click)="cambiarImagenPrincipal(imagen)"
                class="w-24 group h-24 object-cover rounded-lg contain-content bg-gray-200">
                <img [src]="imagen" alt=""
                    class="w-full h-full rounded-lg object-cover justify-self-center group-hover:scale-105 transition-all duration-300">
            </button>
            }
        </div>
    </div>
</section>
