<section class="w-full h-full border border-gray-300 rounded-xl bg-white">

    <div class="px-4 py-3 border-b border-b-gray-300">
        <h3 class="font-medium text-sm">Información Básica de la Promoción</h3>
    </div>


    <div class="grid md:grid-cols-2 p-4 pb-5 gap-y-5 gap-x-5">

        <!-- Nombre -->
        <div class="space-y-2">
            <label for="name" class="block text-sm font-medium">Nombre</label>
            <input name="name" type="text" placeholder="Ingrese el nombre de la promoción" [(ngModel)]="promotion.name"
                class="border rounded-lg border-gray-300 text-sm w-full py-2 px-4 focus:outline-none focus:ring-[1.5px] focus:ring-primary">
            <p class="text-xs text-gray-500">Nombre descriptivo y atractivo para la promoción.</p>
        </div>

        <!-- Etiqueta -->
        <div class="space-y-2">
            <label for="tag" class="block text-sm font-medium">Etiqueta</label>
            <input name="tag" type="text" placeholder="Ingrese la etiqueta de la promoción" [(ngModel)]="promotion.tag"
                class="border rounded-lg border-gray-300 text-sm w-full py-2 px-4 focus:outline-none focus:ring-[1.5px] focus:ring-primary">
            <p class="text-xs text-gray-500">Etiqueta corta que se mostrará en la promoción.</p>
        </div>

        <!-- Tipo de Promoción -->
        <div class="space-y-2 md:col-span-2">
            <label for="type" class="block text-sm font-medium">Tipo de Promoción</label>

            <!-- Select -->
            <select [(ngModel)]="promotion.type" name="type" data-hs-select='{
        "placeholder": "Selecciona una categoría",
        "toggleTag": "<button type=\"button\" aria-expanded=\"false\"></button>",
        "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-2 ps-4 pe-9 flex gap-x-2 text-nowrap cursor-pointer bg-white w-full border border-gray-200 rounded-lg text-start text-sm focus:outline-hidden focus:ring-2 focus:ring-primary",
        "dropdownClasses": "z-50 animate-fade-in w-full max-h-40 p-1 bg-white border border-gray-200 rounded-lg overflow-hidden overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300",
        "optionClasses": "py-2 px-3 w-full text-sm cursor-pointer hover:bg-gray-100 rounded-lg focus:outline-hidden focus:bg-gray-100 hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50",
        "optionTemplate": "<div class=\"flex justify-between items-center w-full\"><span data-title></span><span class=\"hidden hs-selected:block\"><svg class=\"shrink-0 size-4 text-primary \" xmlns=\"http:.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"/></svg></span></div>","extraMarkup": "<div class=\"absolute top-1/2 end-3 -translate-y-1/2\"><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"lucide lucide-chevron-down-icon lucide-chevron-down shrink-0 size-3.5 text-gray-500\"><path d=\"m6 9 6 6 6-6\"/></svg></div>"
      }' class="hidden">
                <option value="">Choose</option>
                <option value="Combo">Combo de Productos</option>
                <option value="BOGO">BOGO (2x1, 3x2)</option>
                <option value="Percent">Descuento Porcentual</option>
            </select>
            <!-- End Select -->

        </div>

        <!-- Descripcion -->
        <div class="space-y-2 md:col-span-2">
            <label for="description" class="block text-sm font-medium">
                Descripción
                <span class="text-gray-500 font-normal text-xs"> (Máximo 255 caracteres)</span>
            </label>
            <textarea name="description" placeholder="Ingrese la descripción de la promoción" rows="3" maxlength="255" [(ngModel)]="promotion.description"
                class="border rounded-lg border-gray-300 text-sm w-full py-2 px-4 focus:outline-none focus:ring-[1.5px] focus:ring-primary resize-none"></textarea>

            <p class="text-xs text-gray-500">Descripción detallada de la promoción y sus beneficios.</p>
        </div>

    </div>

</section>
