<section class="w-full h-full border border-gray-300 rounded-xl bg-white">

    <div class="px-4 py-3 border-b border-b-gray-300">
        <h3 class="font-medium text-sm">Términos y Condiciones</h3>
    </div>

    <div class="grid md:grid-cols-2 pb-5 gap-y-5 px-4 gap-x-5 divide-y divide-gray-300">

        <div class="space-y-2 col-span-2 py-5">
            <label for="term" class="block text-sm font-medium">Añadir Término o Condición</label>

            <div class="flex items-center gap-x-2">
                <input name="term" type="text" [(ngModel)]="newTerm"
                    placeholder="Ej: Promoción válida hasta agotar stock."
                    class="border rounded-lg border-gray-300 text-sm w-full py-2 px-4 focus:outline-none focus:ring-2 focus:ring-primary" />
                <button (click)="addTerm()"
                    class="hover:shadow-md font-medium bg-primary text-white rounded-lg text-sm py-2 px-4 hover:bg-primary-dark">
                    Añadir
                </button>
            </div>
        </div>


        <!-- Términos Actuales -->
        <div class="col-span-2 space-y-5 min-h-36">
            <p class="block text-sm font-medium">Términos Actuales</p>

            <!-- Placeholder cuando no hay términos -->
            <div *ngIf="!promotion.terms || promotion.terms.length === 0"
                class="text-gray-500 py-5 text-center flex flex-col text-sm justify-center space-y-2 items-center">
                <svg lucideFileQuestion class="size-8 stroke-[1.5] text-gray-400" />
                <p class="text-balance">Aún no has agregado ningún término o condición</p>
            </div>

            <!-- Terminos -->
            <div class="space-y-2">

                <div class="flex items-center gap-x-2 py-2 justify-between transition-all duration-300"
                    *ngFor="let term of promotion.terms; let i = index"
                    [ngClass]="{ 'fade-leave': removingTermIndexes.includes(i) }">
                    <p class="text-sm">{{ term }}</p>
                    <button class="text-red-500" (click)="removeTerm(i)">
                        <svg lucideTrash2 class="size-5 stroke-[1.5]" />
                    </button>
                </div>

            </div>
        </div>

    </div>



</section>
