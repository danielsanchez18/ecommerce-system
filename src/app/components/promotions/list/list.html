<section class="lg:border border-gray-300 lg:rounded-xl lg:p-5 flex flex-col gap-7">

    <div class="flex items-center justify-between gap-2">

        <component-shared-search-box class="w-full md:max-w-sm" placeholder="Buscar nombre de la promoción"
            placeholder="Buscar por nombre de promoción" (searchQueryChange)="onSearchQueryChange($event)" />

        <div class="flex items-center gap-x-1">
            <component-shared-filters />
        </div>

    </div>

    <div>
        @if (promotions.length > 0) {
        <component-promotions-table [promotions]="promotions" />
        } @else {
        <component-shared-empty title="No se encontraron promociones"
            message="No hay promociones registradas en el sistema que coincidan con la búsqueda." />
        }
    </div>

    <!-- Si hay más elementos que el tamaño de página, mostrar paginador -->
    @if (totalElements > 0) {
    <component-shared-paginator [page]="page" [totalPages]="totalPages" [totalElements]="totalElements"
        (pageChange)="onPageChange($event - 1)" />
    }

</section>
