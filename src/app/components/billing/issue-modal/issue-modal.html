<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl w-[90%] max-w-md overflow-hidden shadow-2xl animate-in zoom-in-95 duration-200">

        <!-- Header -->
        <div class="px-6 py-3 border-b border-gray-200 flex items-center justify-between bg-gray-50">
            <h2 class="text-sm font-medium">Emitir Comprobante</h2>
            <button (click)="onClose()" class="p-1 hover:bg-gray-200 rounded-lg transition-colors">
                <svg lucideX class="size-5 text-gray-500" />
            </button>
        </div>

        <!-- Body -->
        <div class="p-6 space-y-5">

            <div class="space-y-2">
                <label class="block text-xs font-semibold tracking-wider uppercase">Tipo de Comprobante</label>
                <select [(ngModel)]="request.type" (change)="onTypeChange()"
                    class="w-full text-sm px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
                    <option value="BOLETA">Boleta de Venta</option>
                    <option value="FACTURA">Factura</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="block text-xs font-semibold tracking-wider uppercase">Documento</label>
                    <select [(ngModel)]="request.customerDocumentType"
                        class="w-full text-sm px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
                        <option value="DNI">DNI</option>
                        <option value="RUC">RUC</option>
                        <option value="CE">Carnet de Extranjería</option>
                        <option value="PASAPORTE">Pasaporte</option>
                        <option value="SIN_DOCUMENTO">Sin Doc</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-semibold tracking-wider uppercase">Número</label>
                    <input type="text" [(ngModel)]="request.customerDocumentNumber"
                        class="w-full text-sm px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none"
                        placeholder="Ej. 12345678" />
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-semibold tracking-wider uppercase">
                    {{ request.type === 'FACTURA' ? 'Razón Social' : 'Nombres o Razón Social' }}
                </label>
                <input type="text" [(ngModel)]="request.customerName"
                    class="w-full text-sm px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none"
                    placeholder="Ingrese el nombre del cliente" />
            </div>

            <div class="space-y-2" *ngIf="request.type === 'FACTURA'">
                <label class="block text-xs font-semibold tracking-wider uppercase">Dirección</label>
                <input type="text" [(ngModel)]="request.customerAddress"
                    class="w-full text-sm px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none"
                    placeholder="Obligatorio para facturas" />
            </div>

        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 flex justify-end gap-3">
            <button (click)="onClose()"
                class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                Cancelar
            </button>
            <button (click)="onSubmit()" [disabled]="isSubmitting"
                class="px-4 py-2 text-sm font-medium text-white bg-primary rounded-lg hover:bg-primary-hover disabled:opacity-50 flex items-center gap-2">
                <span *ngIf="isSubmitting"
                    class="size-4 border-2 border-white/20 border-t-white rounded-full animate-spin"></span>
                Emitir <span class="capitalize">{{ request.type }}</span>
            </button>
        </div>

    </div>
</div>
