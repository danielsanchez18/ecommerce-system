<section class="w-full sm:p-5 rounded-xl sm:border border-gray-300 bg-white space-y-5">

    <!-- Categorias -->
    <div class="relative">
        <!-- Degradado izquierdo -->
        <div *ngIf="showLeftArrow"
            class="absolute left-0 top-0 h-full w-10 bg-linear-to-r from-white to-transparent z-10 pointer-events-none">
        </div>

        <!-- Botón izquierda -->
        <button *ngIf="showLeftArrow" (click)="scrollLeft()"
            class="absolute left-0 top-1/2 -translate-y-1/2 z-20 p-2 hover:bg-gray-200 rounded-full text-white">
            <svg lucideChevronLeft class="text-gray-600" />
        </button>

        <!-- Contenedor scroll -->
        <div #scrollContainer class="flex gap-x-3 pb-3 overflow-x-auto scrollbar-hide scroll-smooth snap-x"
            (scroll)="onScroll()">
            @for (category of categories; track $index) {
            <button type="button" (click)="categorySelect(category)"
                class="border min-w-52 w-full hover:shadow-md hover:text-primary border-gray-300 bg-white rounded-xl px-2 py-5 text-sm snap-start"
                [ngClass]="{
            'text-primary pointer-events-none shadow-md': category.isActive
          }">
                <svg [lucideIcon]="category.icon" class="text-zinc-500 justify-self-center size-7 stroke-[1.5]" />
                <p class="font-medium my-2">{{ category.name }}</p>
                <p class="text-xs text-zinc-500 leading-tight text-balance">{{ category.description }}</p>
            </button>
            }
        </div>

        <!-- Botón derecha -->
        <button *ngIf="showRightArrow" (click)="scrollRight()"
            class="absolute right-0 top-1/2 -translate-y-1/2 z-20 p-2 hover:bg-gray-200 rounded-full text-white">
            <svg lucideChevronRight class="text-gray-600" />
        </button>

        <!-- Degradado derecho -->
        <div *ngIf="showRightArrow"
            class="absolute right-0 top-0 h-full w-10 bg-linear-to-l from-white to-transparent z-10 pointer-events-none">
        </div>
    </div>


    <!-- Contenido -->

    <div class="flex justify-between items-center">
        <h2 class="font-semibold">{{ categoryActive?.title }}</h2>

        <a routerLink="{{categoryActive.link}}"
            class="text-sm font-medium rounded-full text-white px-3 leading-none py-3 bg-primary hover:bg-primary-dark transition duration-300 ease-in-out">
            Ver más
        </a>
    </div>

    @switch (categoryActive?.name) {

    @case ('Pedidos') {
    <component-orders-list />
    }

    @case ('Productos') {
    <component-products-list />
    }

    @case ('Categorias') {
    <component-categories-list />
    }

    @case ('Usuarios') {
    <component-users-list />
    }

    @case ('Denuncias') {
    <component-complaints-list />
    }

    }

</section>
