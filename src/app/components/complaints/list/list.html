<article class="rounded-2xl border border-gray-300 bg-white overflow-hidden">
    <!-- Header -->
    <div class="px-5 py-3 border-b border-gray-300 flex justify-between items-center">
        <!-- Search and Actions -->
        <div class="flex items-center gap-3">
            <component-shared-search-box 
                placeholder="Buscar reclamos..."
                (searchQueryChange)="onSearch($event)">
            </component-shared-search-box>
        </div>
    </div>

    <!-- Content -->
    <div class="p-5 flex flex-col gap-5 min-h-[400px]">
        @if (loading) {
            <div class="flex justify-center items-center h-full min-h-[300px]">
                <div class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-blue-600 rounded-full" role="status" aria-label="loading"></div>
            </div>
        } @else if (complaints.length > 0) {
            <component-complaints-table [complaints]="complaints" />
        } @else {
            <component-shared-empty />
        }

        <!-- Paginator -->
        @if (page && page.totalPages > 1) {
            <component-shared-paginator 
                [page]="page.number" 
                [totalPages]="page.totalPages" 
                [totalElements]="page.totalElements"
                (pageChange)="onPageChange($event)">
            </component-shared-paginator>
        }
    </div>
</article>
